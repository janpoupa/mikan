<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Ant Survival AR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    /* Simple desktop start hint overlay */
    #hint {
      position: fixed; left: 0; right: 0; bottom: 12px;
      text-align: center; color: #fff; font-family: sans-serif;
      font-size: 14px; opacity: 0.7; pointer-events: none; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="hint">Put on the headset and press <b>ENTER AR</b>. On desktop: drag to look, WASD to move, click to shoot.</div>

  <a-scene
    game-manager
    background="color: #101015"
    renderer="colorManagement: true; alpha: true; antialias: true"
    webxr="optionalFeatures: local-floor, bounded-floor, hand-tracking"
    vr-mode-ui="enabled: true"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">

    <!-- ===================== ASSETS ===================== -->
    <a-assets>
      <img id="mikanA" src="assets/mikan.png" crossorigin="anonymous" />
      <img id="mikanB" src="assets/mikan2.png" crossorigin="anonymous" />
    </a-assets>

    <!-- ===================== PLAYER RIG ===================== -->
    <a-entity id="rig" position="0 0 0">
      <a-camera id="camera" position="0 1.6 0" look-controls wasd-controls="acceleration: 30">

        <!-- Head-locked HUD (floats in front of the player) -->
        <a-entity id="hud" position="0 -0.42 -1.1">
          <!-- background bar -->
          <a-plane width="1.0" height="0.16" color="#000000" opacity="0.45"
                   material="shader: flat; transparent: true"></a-plane>
          <a-text id="hud-score" value="SCORE 0" align="center" anchor="center"
                  position="-0.33 0.025 0.01" width="1.2" color="#9be15d"></a-text>
          <a-text id="hud-ammo" value="AMMO 10/10" align="center" anchor="center"
                  position="0.34 0.025 0.01" width="1.2" color="#7fd1ff"></a-text>
          <!-- lives label + hearts -->
          <a-text value="LIVES" align="center" anchor="center"
                  position="-0.05 -0.04 0.01" width="1.0" color="#ffffff"></a-text>
          <a-entity id="hearts" position="0.12 -0.04 0.01"></a-entity>
        </a-entity>

        <!-- Damage flash (red full-view plane, hidden by default) -->
        <a-plane id="damage-flash" position="0 0 -0.5" width="4" height="4"
                 color="#ff0000" opacity="0" visible="false"
                 material="shader: flat; transparent: true; depthTest: false"></a-plane>

        <!-- Center messages (start / game over) -->
        <a-entity id="message" position="0 0.15 -1.6">
          <a-plane id="message-bg" width="1.5" height="0.9" color="#000000" opacity="0.6"
                   material="shader: flat; transparent: true"></a-plane>
          <a-text id="message-text" value="" align="center" anchor="center"
                  baseline="center" position="0 0 0.01" width="2.2" color="#ffffff"></a-text>
        </a-entity>
      </a-camera>

      <!-- Controllers: gun mounted on the RIGHT hand -->
      <a-entity id="leftHand" oculus-touch-controls="hand: left" hand-controls="hand: left"></a-entity>
      <a-entity id="rightHand" oculus-touch-controls="hand: right" gun></a-entity>
    </a-entity>

    <!-- Container for spawned ants -->
    <a-entity id="ants"></a-entity>

  </a-scene>

  <script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const CONFIG = {
    SEED: 1337,            // fixed seed -> every playthrough is identical
    MAX_AMMO: 10,          // ammo cap
    START_AMMO: 10,
    RELOAD_PER_SEC: 1,     // +1 bullet per second (no spamming)
    LIVES: 3,
    GUN_RANGE: 11,         // can only hit ants within this distance (metres)
    SHOOT_CONE_DEG: 6,     // aim assist: hit if within this angle of the ray
    HIT_RADIUS: 0.85,      // how close an ant must get to damage the player (metres)
    SPAWN_MIN_DIST: 10,    // ants appear this far away ...
    SPAWN_MAX_DIST: 14,    // ... up to this far
    ANT_SPEED_MIN: 0.55,   // metres / second
    ANT_SPEED_MAX: 1.35,
    ANT_Y: 0.45,           // height of the (floor-crawling) sprite centre
    // Spawn interval as a function of elapsed time (seconds).
    // Starts slow (~2.8s apart) and ramps up to one every 0.45s.
    spawnInterval: function (t) {
      return Math.max(0.45, 2.8 - t * 0.045);
    }
  };

  // ============================================================
  //  Deterministic RNG (mulberry32) so the wave pattern AND
  //  ant speeds/angles are identical every game -> comparable scores.
  // ============================================================
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ============================================================
  //  BILLBOARD: keep the sprite turned to face the player (yaw only,
  //  so it stays upright). The walking wobble lives on the child sprite.
  // ============================================================
  AFRAME.registerComponent('billboard', {
    tick: function () {
      const cam = this.el.sceneEl.camera;
      if (!cam) return;
      const obj = this.el.object3D;
      const camPos = new THREE.Vector3();
      cam.getWorldPosition(camPos);
      const myPos = new THREE.Vector3();
      obj.getWorldPosition(myPos);
      // yaw to face the camera horizontally
      const dx = camPos.x - myPos.x;
      const dz = camPos.z - myPos.z;
      obj.rotation.set(0, Math.atan2(dx, dz), 0);
    }
  });

  // ============================================================
  //  ANT: moves toward the player, animates a crawl (2 frames +
  //  side-to-side rock + bob), reports when it reaches the player.
  // ============================================================
  AFRAME.registerComponent('ant', {
    schema: {
      speed: { type: 'number', default: 0.8 },
      phase: { type: 'number', default: 0 }
    },
    init: function () {
      this.alive = true;
      this.gm = this.el.sceneEl.components['game-manager'];
      this.sprite = this.el.querySelector('.ant-sprite');
      this.frameTimer = 0;
      this.frameOn = false;
      this.t = this.data.phase;
    },
    tick: function (time, dt) {
      if (!this.alive || !this.gm || !this.gm.isPlaying()) return;
      const s = dt / 1000;
      this.t += s;

      const cam = this.el.sceneEl.camera;
      const camPos = new THREE.Vector3();
      cam.getWorldPosition(camPos);
      const obj = this.el.object3D;

      // move toward the player on the horizontal plane
      const dx = camPos.x - obj.position.x;
      const dz = camPos.z - obj.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist > 0.0001) {
        const step = this.data.speed * s;
        obj.position.x += (dx / dist) * step;
        obj.position.z += (dz / dist) * step;
      }

      // crawl animation on the child sprite: rock + bob + frame swap
      if (this.sprite) {
        const rock = Math.sin(this.t * (4 + this.data.speed * 3)) * 0.18; // ~10 deg
        this.sprite.object3D.rotation.z = rock;
        this.sprite.object3D.position.y = Math.abs(Math.sin(this.t * (8 + this.data.speed * 4))) * 0.05;
        this.frameTimer += s;
        const swap = 0.18 / Math.max(0.3, this.data.speed); // faster ants = faster crawl
        if (this.frameTimer >= swap) {
          this.frameTimer = 0;
          this.frameOn = !this.frameOn;
          this.sprite.setAttribute('src', this.frameOn ? '#mikanB' : '#mikanA');
        }
      }

      // reached the player?
      if (dist <= CONFIG.HIT_RADIUS) {
        this.alive = false;
        this.gm.antReachedPlayer(this.el);
      }
    }
  });

  // ============================================================
  //  GUN: mounted on the controller. Trigger fires (and also
  //  starts / restarts the game). Click works on desktop too.
  // ============================================================
  AFRAME.registerComponent('gun', {
    init: function () {
      // build a simple gun model on the controller
      this.buildModel();
      const fire = this.fire.bind(this);
      this.el.addEventListener('triggerdown', fire);
      // desktop fallback: click anywhere shoots from the camera
      this.el.sceneEl.addEventListener('click', () => {
        const gm = this.el.sceneEl.components['game-manager'];
        if (!gm) return;
        if (!gm.isPlaying()) { gm.start(); return; }
        gm.tryShoot(this.el.sceneEl.camera ? this.getCameraEl() : this.el);
      });
      // desktop fallback: space bar
      window.addEventListener('keydown', (e) => {
        if (e.code !== 'Space') return;
        const gm = this.el.sceneEl.components['game-manager'];
        if (!gm) return;
        if (!gm.isPlaying()) { gm.start(); return; }
        gm.tryShoot(this.getCameraEl());
      });
    },
    getCameraEl: function () {
      return document.getElementById('camera');
    },
    fire: function () {
      const gm = this.el.sceneEl.components['game-manager'];
      if (!gm) return;
      if (!gm.isPlaying()) { gm.start(); return; }
      gm.tryShoot(this.el);
      this.muzzleFlash();
    },
    muzzleFlash: function () {
      if (!this.flash) return;
      this.flash.setAttribute('visible', true);
      clearTimeout(this._flashT);
      this._flashT = setTimeout(() => this.flash.setAttribute('visible', false), 60);
    },
    buildModel: function () {
      const body = document.createElement('a-box');
      body.setAttribute('depth', '0.22');
      body.setAttribute('height', '0.05');
      body.setAttribute('width', '0.05');
      body.setAttribute('color', '#2b2b33');
      body.setAttribute('position', '0 0 -0.08');

      const barrel = document.createElement('a-cylinder');
      barrel.setAttribute('radius', '0.013');
      barrel.setAttribute('height', '0.2');
      barrel.setAttribute('rotation', '-90 0 0');
      barrel.setAttribute('color', '#16161c');
      barrel.setAttribute('position', '0 0.005 -0.2');

      const grip = document.createElement('a-box');
      grip.setAttribute('depth', '0.05');
      grip.setAttribute('height', '0.12');
      grip.setAttribute('width', '0.045');
      grip.setAttribute('color', '#3a3a44');
      grip.setAttribute('position', '0 -0.07 0.01');
      grip.setAttribute('rotation', '20 0 0');

      const flash = document.createElement('a-sphere');
      flash.setAttribute('radius', '0.04');
      flash.setAttribute('color', '#fff2a8');
      flash.setAttribute('material', 'shader: flat; color: #fff2a8');
      flash.setAttribute('position', '0 0.005 -0.31');
      flash.setAttribute('visible', false);
      this.flash = flash;

      this.el.appendChild(body);
      this.el.appendChild(barrel);
      this.el.appendChild(grip);
      this.el.appendChild(flash);
    }
  });

  // ============================================================
  //  GAME MANAGER: state, scoring, ammo, lives, spawning, shooting.
  // ============================================================
  AFRAME.registerComponent('game-manager', {
    init: function () {
      this.state = 'ready';        // ready | playing | over
      this.ants = [];
      this.antContainer = document.getElementById('ants');
      this.messageEl = document.getElementById('message');
      this.messageText = document.getElementById('message-text');
      this.hudScore = document.getElementById('hud-score');
      this.hudAmmo = document.getElementById('hud-ammo');
      this.heartsEl = document.getElementById('hearts');
      this.damageFlash = document.getElementById('damage-flash');

      this.buildHearts();
      this.resetVars();
      this.showMessage('ANT SURVIVAL\n\nPull the trigger to start\n(or click on desktop)');
      this.updateHUD();

      // make sure AR passthrough shows through (transparent clear)
      this.el.addEventListener('enter-vr', () => {
        if (this.el.is('ar-mode')) {
          this.el.renderer.setClearAlpha(0);
          const bg = this.el.getAttribute('background');
          this.el.setAttribute('background', 'color: transparent');
        }
      });
    },

    resetVars: function () {
      this.score = 0;
      this.lives = CONFIG.LIVES;
      this.ammo = CONFIG.START_AMMO;
      this.gameTime = 0;
      this.reloadAcc = 0;
      this.nextSpawnTime = 0.6;     // first ant shortly after start
      this.spawnIndex = 0;
      this.rng = mulberry32(CONFIG.SEED);
      this.clearAnts();
    },

    isPlaying: function () { return this.state === 'playing'; },

    // ---------- lifecycle ----------
    start: function () {
      this.resetVars();
      this.state = 'playing';
      this.hideMessage();
      this.updateHUD();
    },

    gameOver: function () {
      this.state = 'over';
      this.showMessage('YOU SURVIVED ' + this.gameTime.toFixed(1) + 's\n\nSCORE: ' + this.score +
                       '\n\nPull the trigger to play again');
    },

    // ---------- per-frame ----------
    tick: function (time, dt) {
      if (this.state !== 'playing') return;
      const s = dt / 1000;
      this.gameTime += s;

      // ammo regen (capped)
      this.reloadAcc += s * CONFIG.RELOAD_PER_SEC;
      if (this.reloadAcc >= 1 && this.ammo < CONFIG.MAX_AMMO) {
        const add = Math.floor(this.reloadAcc);
        this.ammo = Math.min(CONFIG.MAX_AMMO, this.ammo + add);
        this.reloadAcc -= add;
        this.updateHUD();
      } else if (this.ammo >= CONFIG.MAX_AMMO) {
        this.reloadAcc = 0;
      }

      // deterministic spawning driven purely by elapsed game time
      while (this.gameTime >= this.nextSpawnTime) {
        this.spawnAnt();
        const interval = CONFIG.spawnInterval(this.nextSpawnTime);
        this.nextSpawnTime += interval;
      }
    },

    // ---------- spawning ----------
    spawnAnt: function () {
      const cam = this.el.sceneEl.camera;
      const camPos = new THREE.Vector3();
      if (cam) cam.getWorldPosition(camPos);

      // all randomness comes from the seeded RNG -> identical every game
      const angle = this.rng() * Math.PI * 2;
      const dist = CONFIG.SPAWN_MIN_DIST + this.rng() * (CONFIG.SPAWN_MAX_DIST - CONFIG.SPAWN_MIN_DIST);
      const speed = CONFIG.ANT_SPEED_MIN + this.rng() * (CONFIG.ANT_SPEED_MAX - CONFIG.ANT_SPEED_MIN);
      const phase = this.rng() * Math.PI * 2;

      const x = camPos.x + Math.sin(angle) * dist;
      const z = camPos.z + Math.cos(angle) * dist;

      const ant = document.createElement('a-entity');
      ant.setAttribute('position', { x: x, y: CONFIG.ANT_Y, z: z });
      ant.setAttribute('billboard', '');
      ant.setAttribute('ant', { speed: speed, phase: phase });

      const sprite = document.createElement('a-image');
      sprite.setAttribute('class', 'ant-sprite');
      sprite.setAttribute('src', '#mikanA');
      sprite.setAttribute('width', '0.8');
      sprite.setAttribute('height', '0.8');
      sprite.setAttribute('material', 'transparent: true; alphaTest: 0.5; side: double');
      ant.appendChild(sprite);

      this.antContainer.appendChild(ant);
      this.ants.push(ant);
    },

    removeAnt: function (antEl) {
      const i = this.ants.indexOf(antEl);
      if (i !== -1) this.ants.splice(i, 1);
      if (antEl.parentNode) antEl.parentNode.removeChild(antEl);
    },

    clearAnts: function () {
      (this.ants || []).forEach((a) => { if (a.parentNode) a.parentNode.removeChild(a); });
      this.ants = [];
    },

    // ---------- shooting ----------
    tryShoot: function (originEl) {
      if (this.ammo <= 0) return;          // out of bullets, can't fire
      this.ammo -= 1;
      this.updateHUD();

      const obj = originEl.object3D;
      const origin = new THREE.Vector3();
      obj.getWorldPosition(origin);
      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(obj.getWorldQuaternion(new THREE.Quaternion())).normalize();

      const cosThresh = Math.cos(THREE.MathUtils.degToRad(CONFIG.SHOOT_CONE_DEG));
      let best = null, bestDist = Infinity;
      const toAnt = new THREE.Vector3();

      for (const ant of this.ants) {
        ant.object3D.getWorldPosition(toAnt);
        toAnt.sub(origin);
        const d = toAnt.length();
        if (d > CONFIG.GUN_RANGE) continue;      // out of gun range
        toAnt.normalize();
        if (toAnt.dot(dir) < cosThresh) continue; // not aimed at it
        if (d < bestDist) { bestDist = d; best = ant; }
      }

      if (best) {
        this.killAnt(best);
      }
    },

    killAnt: function (antEl) {
      const comp = antEl.components.ant;
      if (comp) comp.alive = false;
      this.score += 1;
      this.updateHUD();

      // quick death pop: scale up + fade, then remove
      const sprite = antEl.querySelector('.ant-sprite');
      if (sprite) {
        sprite.setAttribute('animation__pop', 'property: scale; to: 1.6 1.6 1.6; dur: 150; easing: easeOutQuad');
        sprite.setAttribute('animation__fade', 'property: material.opacity; from: 1; to: 0; dur: 180');
      }
      setTimeout(() => this.removeAnt(antEl), 190);
    },

    // ---------- damage / lives ----------
    antReachedPlayer: function (antEl) {
      this.removeAnt(antEl);
      this.lives -= 1;
      this.updateHUD();
      this.flashDamage();
      if (this.lives <= 0) this.gameOver();
    },

    flashDamage: function () {
      const el = this.damageFlash;
      el.setAttribute('visible', true);
      el.removeAttribute('animation__dmg');
      el.setAttribute('material', 'opacity', 0.55);
      el.setAttribute('animation__dmg', 'property: material.opacity; from: 0.55; to: 0; dur: 400; easing: easeOutQuad');
      clearTimeout(this._dmgT);
      this._dmgT = setTimeout(() => el.setAttribute('visible', false), 420);
    },

    // ---------- HUD ----------
    buildHearts: function () {
      this.hearts = [];
      const spacing = 0.07;
      for (let i = 0; i < CONFIG.LIVES; i++) {
        const h = document.createElement('a-plane');
        // a small red square standing in for a heart icon
        h.setAttribute('width', '0.05');
        h.setAttribute('height', '0.05');
        h.setAttribute('color', '#ff3b56');
        h.setAttribute('position', (i * spacing) + ' 0 0');
        h.setAttribute('material', 'shader: flat');
        this.heartsEl.appendChild(h);
        this.hearts.push(h);
      }
    },

    updateHUD: function () {
      this.hudScore.setAttribute('value', 'SCORE ' + this.score);
      this.hudAmmo.setAttribute('value', 'AMMO ' + this.ammo + '/' + CONFIG.MAX_AMMO);
      for (let i = 0; i < this.hearts.length; i++) {
        this.hearts[i].setAttribute('visible', i < this.lives);
      }
    },

    showMessage: function (txt) {
      this.messageText.setAttribute('value', txt);
      this.messageEl.setAttribute('visible', true);
    },
    hideMessage: function () {
      this.messageEl.setAttribute('visible', false);
    }
  });
  </script>
</body>
</html>
